<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case 3 - Pancreatitis - Assess for complication - Venous Phase (Axial)</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        #viewer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #dicom-image {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        #counter {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            padding: 7px 12px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 16px;
            line-height: 1;
            z-index: 10;
            pointer-events: none;
        }

        #loading {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            padding: 7px 12px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="viewer">
        <img id="dicom-image" src="images/001.jpg" alt="Radiology slice">
        <div id="counter">1 / 252</div>
        <div id="loading">Loading images...</div>
    </div>

    <script>
        const totalSlices = 252;
        const imageElement = document.getElementById("dicom-image");
        const counterElement = document.getElementById("counter");
        const loadingElement = document.getElementById("loading");

        let currentSlice = 1;
        let wheelLocked = false;
        const preloadedImages = [];

        function slicePath(sliceNumber) {
            return `images/${String(sliceNumber).padStart(3, "0")}.jpg`;
        }

        function showSlice(sliceNumber) {
            currentSlice = Math.max(1, Math.min(totalSlices, sliceNumber));
            imageElement.src = slicePath(currentSlice);
            counterElement.textContent = `${currentSlice} / ${totalSlices}`;
        }

        function nextSlice() {
            if (currentSlice < totalSlices) {
                showSlice(currentSlice + 1);
            }
        }

        function previousSlice() {
            if (currentSlice > 1) {
                showSlice(currentSlice - 1);
            }
        }

        function preloadImages() {
            let loadedCount = 0;

            for (let i = 1; i <= totalSlices; i++) {
                const image = new Image();

                const markLoaded = () => {
                    loadedCount += 1;
                    loadingElement.textContent = `Loaded ${loadedCount} / ${totalSlices}`;

                    if (loadedCount === totalSlices) {
                        loadingElement.style.display = "none";
                    }
                };

                image.onload = markLoaded;
                image.onerror = markLoaded;
                image.src = slicePath(i);
                preloadedImages.push(image);
            }
        }

        window.addEventListener("wheel", (event) => {
            event.preventDefault();

            if (wheelLocked) {
                return;
            }

            wheelLocked = true;

            if (event.deltaY > 0) {
                nextSlice();
            } else if (event.deltaY < 0) {
                previousSlice();
            }

            window.setTimeout(() => {
                wheelLocked = false;
            }, 20);
        }, { passive: false });

        window.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight") {
                event.preventDefault();
                nextSlice();
            } else if (event.key === "ArrowLeft") {
                event.preventDefault();
                previousSlice();
            }
        });

        imageElement.addEventListener("dragstart", (event) => {
            event.preventDefault();
        });

        showSlice(1);
        preloadImages();
    </script>
</body>
</html>
