<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CTPA Case 2</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial,sans-serif;
}

#img {
  width:100vw;
  height:100vh;
  object-fit:contain;
}

#info {
  position:fixed;
  bottom:15px;
  left:20px;
  color:#ffd84d;
  font-size:18px;
}

#title {
  position:fixed;
  top:10px;
  left:20px;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div id="title">CT Chest and CTPA - Case 2</div>

<img id="img" src="images/001.jpg">

<div id="info">Image 1/259</div>

<script>

const lastSlice = 259;
let index = 1;

const img = document.getElementById("img");
const info = document.getElementById("info");

const files = [];

for(let i=1;i<=lastSlice;i++) {
  files.push(
    "images/" +
    String(i).padStart(3,"0") +
    ".jpg"
  );
}

files.forEach(src => {
  const preload = new Image();
  preload.src = src;
});

function showSlice(n) {

  if(n < 1) n = 1;
  if(n > lastSlice) n = lastSlice;

  index = n;

  img.src = files[index-1];

  info.textContent =
    "Image " + index + "/" + lastSlice;
}

document.addEventListener("wheel", e => {

  e.preventDefault();

  if(e.deltaY > 0)
    showSlice(index+1);
  else
    showSlice(index-1);

}, {passive:false});

document.addEventListener("keydown", e => {

  if(e.key==="ArrowDown" || e.key==="ArrowRight")
    showSlice(index+1);

  if(e.key==="ArrowUp" || e.key==="ArrowLeft")
    showSlice(index-1);

});

</script>

</body>
</html>
