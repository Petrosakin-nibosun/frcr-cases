<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CTPA Case 2 Multiwindow</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

#scan {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}

#title {
  position: fixed;
  top: 10px;
  left: 20px;
  font-size: 18px;
  z-index: 10;
}

#info {
  position: fixed;
  bottom: 15px;
  left: 20px;
  color: #ffd84d;
  font-size: 18px;
  z-index: 10;
}

#controls {
  position: fixed;
  top: 45px;
  left: 20px;
  z-index: 20;
}

button {
  background: #333;
  color: white;
  border: 1px solid #777;
  padding: 8px 12px;
  margin-right: 5px;
  font-size: 14px;
  border-radius: 6px;
}

button.active {
  background: #1f6feb;
}
</style>
</head>

<body>

<div id="title">CT Chest and CTPA - Case 2</div>

<div id="controls">
  <button id="softBtn" onclick="setWindow('soft')">Soft tissue</button>
  <button id="lungBtn" onclick="setWindow('lung')">Lung</button>
  <button id="boneBtn" onclick="setWindow('bone')">Bone</button>
</div>

<img id="scan" src="soft/001.jpg">

<div id="info">Soft tissue | Image 1/259</div>

<script>
const lastSlice = 259;
let index = 1;
let currentWindow = "soft";

const scan = document.getElementById("scan");
const info = document.getElementById("info");

function filename(slice) {
  return String(slice).padStart(3, "0") + ".jpg";
}

function updateButtons() {
  document.getElementById("softBtn").classList.toggle("active", currentWindow === "soft");
  document.getElementById("lungBtn").classList.toggle("active", currentWindow === "lung");
  document.getElementById("boneBtn").classList.toggle("active", currentWindow === "bone");
}

function windowLabel() {
  if (currentWindow === "soft") return "Soft tissue";
  if (currentWindow === "lung") return "Lung";
  if (currentWindow === "bone") return "Bone";
  return currentWindow;
}

function showSlice(n) {
  if (n < 1) n = 1;
  if (n > lastSlice) n = lastSlice;

  index = n;

  scan.src = currentWindow + "/" + filename(index);

  info.textContent =
    windowLabel() + " | Image " + index + "/" + lastSlice;
}

function setWindow(name) {
  currentWindow = name;
  updateButtons();
  showSlice(index);
}

document.addEventListener("wheel", function(e) {
  e.preventDefault();

  if (e.deltaY > 0) {
    showSlice(index + 1);
  } else {
    showSlice(index - 1);
  }
}, { passive: false });

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowDown" || e.key === "ArrowRight") showSlice(index + 1);
  if (e.key === "ArrowUp" || e.key === "ArrowLeft") showSlice(index - 1);

  if (e.key === "1") setWindow("soft");
  if (e.key === "2") setWindow("lung");
  if (e.key === "3") setWindow("bone");
});

["soft", "lung", "bone"].forEach(folder => {
  for (let i = 1; i <= lastSlice; i++) {
    const img = new Image();
    img.src = folder + "/" + filename(i);
  }
});

updateButtons();
showSlice(1);
</script>

</body>
</html>
