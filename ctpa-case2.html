<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CT Chest and CTPA - Case 2</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #title {
      position: fixed;
      top: 10px;
      left: 20px;
      font-size: 18px;
      opacity: 0.9;
    }
    #viewer {
      width: 90vw;
      height: 85vh;
      background: #000;
      border: 1px solid #333;
    }
    #info {
      position: fixed;
      bottom: 15px;
      left: 20px;
      font-size: 18px;
      color: #ffd84d;
    }
    #help {
      position: fixed;
      bottom: 15px;
      right: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="title">CT Chest and CTPA - Case 2</div>
  <div id="viewer"></div>
  <div id="info">Loading...</div>
  <div id="help">Mouse wheel = scroll slices</div>

  <script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.min.js"></script>
  <script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.min.js"></script>
  <script src="https://unpkg.com/cornerstone-wado-image-loader@3.3.2/dist/cornerstoneWADOImageLoader.min.js"></script>

  <script>
    const lastSlice = 259;
    let index = 1;
    const element = document.getElementById('viewer');
    const info = document.getElementById('info');

    cornerstoneWADOImageLoader.external.cornerstone = cornerstone;
    cornerstoneWADOImageLoader.external.dicomParser = dicomParser;
    cornerstoneWADOImageLoader.configure({
      beforeSend: function(xhr) {}
    });

    cornerstone.enable(element);

    const imageIds = [];
    for (let i = 1; i <= lastSlice; i++) {
      imageIds.push('wadouri:http://localhost:8765/dicom/' + i);
    }

    function showSlice(n) {
      if (n < 1) n = 1;
      if (n > lastSlice) n = lastSlice;
      index = n;
      info.textContent = 'Image #' + index + '/' + lastSlice;
      cornerstone.loadAndCacheImage(imageIds[index - 1]).then(function(image) {
        cornerstone.displayImage(element, image);
        const viewport = cornerstone.getViewport(element);
        viewport.scale = Math.min(element.clientWidth / image.width, element.clientHeight / image.height);
        cornerstone.setViewport(element, viewport);
      }).catch(function(err) {
        info.textContent = 'Could not load slice ' + index + '. Check server is running.';
        console.error(err);
      });
    }

    element.addEventListener('wheel', function(event) {
      event.preventDefault();
      if (event.deltaY > 0) {
        showSlice(index + 1);
      } else {
        showSlice(index - 1);
      }
    }, { passive: false });

    window.addEventListener('keydown', function(event) {
      if (event.key === 'ArrowDown' || event.key === 'ArrowRight') showSlice(index + 1);
      if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') showSlice(index - 1);
    });

    showSlice(1);
  </script>
</body>
</html>
