<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRCR Cases</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: #111;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
}

.container {
    width: min(900px, calc(100% - 32px));
    margin: 0 auto;
    padding: 50px 0;
}

h1 {
    margin: 0 0 10px;
    font-size: 42px;
}

.subtitle {
    margin: 0 0 40px;
    color: #aaa;
    font-size: 18px;
}

.case-list {
    display: grid;
    gap: 16px;
}

.case-card {
    display: block;
    padding: 22px;
    background: #252525;
    border: 1px solid #444;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    transition: background 0.15s ease, border-color 0.15s ease;
}

.case-card:hover {
    background: #1f6feb;
    border-color: #58a6ff;
}

.case-title {
    display: block;
    margin-bottom: 7px;
    font-size: 22px;
    font-weight: bold;
}

.case-description {
    display: block;
    color: #bbb;
    font-size: 16px;
}

.case-card:hover .case-description {
    color: white;
}

@media (max-width: 600px) {
    .container {
        padding-top: 30px;
    }

    h1 {
        font-size: 34px;
    }

    .case-card {
        padding: 18px;
    }

    .case-title {
        font-size: 19px;
    }
}
</style>
</head>

<body>

<main class="container">

<h1>FRCR Cases</h1>

<p class="subtitle">
Choose a case to review.
</p>

<div class="case-list">

<a class="case-card" href="ctpa-case2-jpg/ctpa-case2.html">
    <span class="case-title">Case 2 - Pulmonary Embolism</span>
    <span class="case-description">Original single-window CTPA viewer</span>
</a>

<a class="case-card" href="ctpa-case2-multiwindow/index.html">
    <span class="case-title">Case 2 - Pulmonary Embolism</span>
    <span class="case-description">Axial multiwindow viewer</span>
</a>

<a class="case-card" href="Case 3 - Pancreatitis - Assess for complication/">
    <span class="case-title">Case 3 - Pancreatitis</span>
    <span class="case-description">Assess for complication</span>
</a>

</div>

</main>

</body>
</html>
