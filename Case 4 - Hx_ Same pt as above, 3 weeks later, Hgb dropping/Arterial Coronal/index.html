<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case 4 - Hx: Same pt as above, 3 weeks later, Hgb dropping - Arterial Coronal</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        #viewer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #dicom-image {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        #title {
            position: fixed;
            top: 12px;
            left: 16px;
            padding: 7px 10px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.65);
            font-size: 15px;
            z-index: 20;
            pointer-events: none;
        }

        #controls {
            position: fixed;
            top: 52px;
            left: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 20;
        }

        button {
            padding: 8px 11px;
            border: 1px solid #777;
            border-radius: 6px;
            background: #333;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        button.active {
            background: #1f6feb;
            border-color: #58a6ff;
        }

        #counter {
            position: fixed;
            bottom: 14px;
            left: 16px;
            padding: 7px 11px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.65);
            color: #ffd84d;
            font-size: 16px;
            z-index: 20;
            pointer-events: none;
        }

        #window-info {
            position: fixed;
            bottom: 14px;
            right: 16px;
            padding: 7px 11px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.65);
            font-size: 14px;
            z-index: 20;
            pointer-events: none;
        }

        @media (max-width: 700px) {
            #title {
                max-width: calc(100vw - 52px);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            #controls {
                top: 48px;
            }

            button {
                padding: 7px 9px;
                font-size: 13px;
            }

            #window-info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="viewer">
        <img id="dicom-image" src="soft-tissue/001.jpg" alt="Radiology slice">
        <div id="title">Case 4 - Hx: Same pt as above, 3 weeks later, Hgb dropping - Arterial Coronal</div>
        <div id="controls"><button id="button-soft" onclick="setWindow('soft')">Soft tissue</button></div>
        <div id="counter">Image 1 / 143</div>
        <div id="window-info"></div>
    </div>

    <script>
        const totalSlices = 143;
        const windows = {"soft": {label: "Soft tissue", folder: "soft-tissue", width: 350, level: 40}};

        let currentSlice = 1;
        let currentWindow = "soft";
        let wheelLocked = false;

        const imageElement = document.getElementById("dicom-image");
        const counterElement = document.getElementById("counter");
        const windowInfoElement = document.getElementById("window-info");
        const preloadedWindows = new Set();

        function filename(sliceNumber) {
            return String(sliceNumber).padStart(3, "0") + ".jpg";
        }

        function imagePath(windowName, sliceNumber) {
            return windows[windowName].folder + "/" + filename(sliceNumber);
        }

        function updateButtons() {
            Object.keys(windows).forEach((name) => {
                document
                    .getElementById("button-" + name)
                    .classList.toggle("active", name === currentWindow);
            });
        }

        function updateInformation() {
            const preset = windows[currentWindow];
            counterElement.textContent =
                "Image " + currentSlice + " / " + totalSlices;
            windowInfoElement.textContent =
                preset.label + " | WW/WL " + preset.width + "/" + preset.level;
        }

        function showSlice(sliceNumber) {
            currentSlice = Math.max(1, Math.min(totalSlices, sliceNumber));
            imageElement.src = imagePath(currentWindow, currentSlice);
            updateInformation();
        }

        function setWindow(windowName) {
            if (!windows[windowName]) return;
            currentWindow = windowName;
            updateButtons();
            showSlice(currentSlice);
            preloadWindow(windowName);
        }

        function preloadWindow(windowName) {
            if (preloadedWindows.has(windowName)) return;
            preloadedWindows.add(windowName);

            for (let i = 1; i <= totalSlices; i++) {
                const image = new Image();
                image.src = imagePath(windowName, i);
            }
        }

        window.addEventListener("wheel", (event) => {
            event.preventDefault();

            if (wheelLocked) return;
            wheelLocked = true;

            if (event.deltaY > 0) {
                showSlice(currentSlice + 1);
            } else if (event.deltaY < 0) {
                showSlice(currentSlice - 1);
            }

            window.setTimeout(() => {
                wheelLocked = false;
            }, 20);
        }, { passive: false });

        window.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight" || event.key === "ArrowDown") {
                event.preventDefault();
                showSlice(currentSlice + 1);
                return;
            }

            if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
                event.preventDefault();
                showSlice(currentSlice - 1);
                return;
            }

            const shortcutNumber = Number(event.key);
            const names = Object.keys(windows);

            if (
                Number.isInteger(shortcutNumber) &&
                shortcutNumber >= 1 &&
                shortcutNumber <= names.length
            ) {
                setWindow(names[shortcutNumber - 1]);
            }
        });

        imageElement.addEventListener("dragstart", (event) => {
            event.preventDefault();
        });

        updateButtons();
        updateInformation();
        preloadWindow(currentWindow);
    </script>
</body>
</html>
